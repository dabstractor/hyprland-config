# Clipboard History
cliphist {
    # Mandatory fields
    command = alacritty --title cliphist -e zsh -c 'source ~/.config/zsh/functions.zsh && clh 300'

    # At least one is mandatory, title takes priority
    title = cliphist

    # Optional fields
    options = persist lazy shiny
    rules = float;size (monitor_w*0.6) (monitor_h*0.8);move (monitor_w*0.2) (monitor_h*0.1)
}
