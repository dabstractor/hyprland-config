# Hyprscratch configuration file
# Converted from old format to new configuration file format

# Optional globals that apply to all scratchpads
daemon_options = clean
global_options =
global_rules =

# Terminal scratchpad
terminal {
    # Mandatory fields
    command = alacritty --title terminal -e tmux new-session -A -s main

    # At least one is mandatory, title takes priority
    title = terminal

    # Optional fields
    options = persist sticky
    rules = float;size (monitor_w*0.997) (monitor_h*0.976);move (monitor_w*0.0017) (monitor_h*0.0017)
}

# System monitor
btop {
    # Mandatory fields
    command = kitty --title btop -e btop

    # At least one is mandatory, title takes priority
    title = btop

    # Optional fields
    options = lazy shiny
    rules = float;size (monitor_w*0.92) (monitor_h*0.92);center
}

# Calculator
Calculator {
    # Mandatory fields
    command = /usr/bin/gnome-calculator

    # At least one is mandatory, title takes priority
    title = Calculator
    options = lazy shiny

    # Optional fields
    rules = float;size 400px 600px;move 100%-400px 100%-710px
}

# ClickUp
ClickUp {
    # Mandatory fields
    # ClickUp dropped the AppImage in a recent update; it now ships as
    # /opt/clickup/desktop, symlinked as /usr/bin/clickup (see ClickUp.desktop).
    command = /usr/bin/clickup

    # At least one is mandatory, title takes priority
    title = ClickUp

    # Optional fields
    options = persist lazy shiny
    rules =
}

# Figma
Figma {
    # Mandatory fields
    # Figma's bundled Chromium 124 can't HW-accelerate WebGL on NVIDIA here:
    #   - native Wayland: GBM scanout-modifier bug crashes GPU process -> SwiftShader.
    #   - XWayland + default passthrough decoder: WebGL drawing buffer fails (GL passthrough
    #     can't produce a texture from OzoneImageBacking -> 'incompatible backing').
    # Fix: XWayland + the VALIDATING command decoder, which is compatible with
    # OzoneImageBacking -> WebGL renders on the RTX 3080 Ti. Both flags must be in argv
    # (commandSwitches/appendSwitch don't reach the GPU process).
    command = /usr/bin/figma-linux --ozone-platform=x11 --use-cmd-decoder=validating --no-sandbox --ignore-gpu-blacklist --enable-accelerated-2d-canvas --force-gpu-rasterization --enable-gpu-rasterization

    # hyprscratch matches against the window's CREATION-TIME initialTitle/initialClass
    # (per its README), not the current title. Under XWayland, Electron sets the
    # initialTitle to "figma-linux" and only later changes it to "Figma", so
    # "title = Figma" never matched and the window was never claimed as a scratchpad
    # (this is why toggle/ hide-show didn't work). "figma-linux" matches both fields.
    title = figma-linux

    # Optional fields
    options = persist lazy shiny
    # Geometry applied on every SHOW (hyprscratch rules), not just at window map.
    # Hyprland windowrules fire once at creation; a scratchpad is shown/hidden by
    # moving workspaces, so without this Figma reverts to its XWayland-remembered
    # geometry (bottom-right, cut off). These re-assert size+position each toggle.
    rules = float;size 3560 2060;center
}

# Signal
Signal {
    # Mandatory fields
    command = signal-desktop

    # At least one is mandatory, title takes priority
    title = Signal

    # Optional fields
    options = persist lazy shiny
    rules = float;size (monitor_w*0.92) (monitor_h*0.92);center
}

