# Hyprscratch configuration file
# Converted from old format to new configuration file format

# Optional globals that apply to all scratchpads
daemon_options = clean
global_options =
global_rules =

# Terminal scratchpad
terminal {
    # Mandatory fields
    command = alacritty --title terminal -e tmux new-session -A -s main

    # At least one is mandatory, title takes priority
    title = terminal

    # Optional fields
    options = persist sticky
    rules = float;size (monitor_w*0.997) (monitor_h*0.976);move (monitor_w*0.0017) (monitor_h*0.0017)
}

# System monitor
btop {
    # Mandatory fields
    command = kitty --title btop -e btop

    # At least one is mandatory, title takes priority
    title = btop

    # Optional fields
    options = lazy shiny
    rules = float;size (monitor_w*0.92) (monitor_h*0.92);center
}

# Calculator
Calculator {
    # Mandatory fields
    command = /usr/bin/gnome-calculator

    # At least one is mandatory, title takes priority
    title = Calculator
    options = lazy shiny

    # Optional fields
    rules = float;size 400px 600px;move 100%-400px 100%-710px
}

# ClickUp
ClickUp {
    # Mandatory fields
    command = /opt/clickup/clickup-desktop.AppImage

    # At least one is mandatory, title takes priority
    title = ClickUp

    # Optional fields
    options = persist lazy shiny
    rules =
}

# Figma
Figma {
    # Mandatory fields
    command = /usr/bin/figma-linux --no-sandbox --enable-oop-rasterization --ignore-gpu-blacklist -enable-experimental-canvas-features --enable-accelerated-2d-canvas --force-gpu-rasterization --enable-fast-unload --enable-accelerated-vpx-decode=3 --enable-tcp-fastopen --javascript-harmony --enable-checker-imaging --v8-cache-options=code --v8-cache-strategies-for-cache-storage=aggressive --enable-zero-copy --ui-enable-zero-copy --enable-native-gpu-memory-buffers --enable-webgl-image-chromium --enable-accelerated-video --enable-gpu-rasterization

    # At least one is mandatory, title takes priority
    title = Figma

    # Optional fields
    options = persist lazy shiny
    rules =
}

