# Hyprscratch configuration file
# Converted from old format to new configuration file format

# Optional globals that apply to all scratchpads
daemon_options = clean
global_options =
global_rules =

# Terminal scratchpad
terminal {
    # Mandatory fields
    command = alacritty --title terminal -e tmux new-session -A -s main

    # At least one is mandatory, title takes priority
    title = terminal

    # Optional fields
    options = persist
    rules = float;size 99.7% 97.6%;move 0.17% 0.17%
}

# System monitor
btop {
    # Mandatory fields
    command = kitty --title btop -e btop

    # At least one is mandatory, title takes priority
    title = btop

    # Optional fields
    options = lazy
    rules = float;size 92% 92%;center
}

# Calculator
Calculator {
    # Mandatory fields
    command = /usr/bin/gnome-calculator

    # At least one is mandatory, title takes priority
    title = Calculator
    options = lazy

    # Optional fields
    rules = float;size 400px 600px;move 100%-400px 100%-710px
}

# ClickUp
ClickUp {
    # Mandatory fields
    command = /opt/clickup/clickup-desktop.AppImage

    # At least one is mandatory, title takes priority
    title = ClickUp

    # Optional fields
    options = persist lazy
    rules =
}

# Matterhorn (IRC client)
matterhorn {
    # Mandatory fields
    command = kitty --title matterhorn -e bash -c matterhorn

    # At least one is mandatory, title takes priority
    title = matterhorn

    # Optional fields
    options = persist lazy
    rules = float;size 92% 92%;center
}

