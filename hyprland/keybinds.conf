# ################### It just works™ keybinds ###################
# Volume
bindl = Super,       XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = Alt,         XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = ,            XF86AudioMute, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
# bindl = Ctrl+Shift, M,             exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
# bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bindle=, XF86AudioRaiseVolume, exec, pamixer --allow-boost -i 5

# Brightness
# Uncomment these if you can't get AGS to work
bindle=, XF86MonBrightnessUp, exec, brightnessctl set '12.75+'
bindle=, XF86MonBrightnessDown, exec, brightnessctl set '12.75-'

# ################################### Applications ###################################
# Apps: just normal apps
# bind = Super, T, exec, kitty
# bind = Super+Alt, T, exec, foot
bind = Super, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh  "${TERMINAL}" "kitty -1" "foot" "wezterm" "konsole" "kgx" "uxterm" "xterm" "alacritty" # [hidden] (terminal) (alt)
# bind = Super, E, exec, nautilus --new-window
bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" "${TERMINAL}" "kitty -1 fish -c yazi" # File manager

# Apps: Settings and config
bind = Control+Super+Shift, V, exec, easyeffects
bind = Control+Shift, Escape, exec, gnome-system-monitor

# Actions
bind = Super,                   Q,      killactive,
bind = Super+Alt,               Space,  togglefloating,
bind = Shift+Super+Alt,         Q,      exec, hyprctl kill
bind = Control+Shift+Alt,       Delete, exec, pkill wlogout || wlogout -p layer-shell
bind = Control+Shift+Alt+Super, Delete, exec, systemctl poweroff || loginctl poweroff

# Screenshot, Record, OCR, Color picker, Clipboard history
bind = Super+Shift+Alt,   S,     exec, grim -g "$(slurp)" - | swappy -f -
# bindl= ,                  Print, exec, grim - | wl-copy
bindld = ,Print, Screenshot >> clipboard ,exec,grim - | wl-copy # Screenshot >> clipboard
# bindl= Control,           Print, exec, mkdir -p ~/Pictures/Screenshots && ~/.config/ags/scripts/grimblast.sh copysave screen ~/Pictures/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png
bindd = Super+Shift, S, Screen snip, exec, qs -p ~/.config/quickshell/$qsConfig/screenshot.qml || pidof slurp || hyprshot --freeze --clipboard-only --mode region --silent # Screen snip
bindld = Ctrl,Print, Screenshot >> clipboard & save, exec, mkdir -p $(xdg-user-dir PICTURES)/Screenshots && grim $(xdg-user-dir PICTURES)/Screenshots/Screenshot_"$(date '+%Y-%m-%d_%H.%M.%S')".png # Screenshot >> clipboard & file
bindd = Super+Alt, R, Record region (no sound), exec, ~/.config/hypr/hyprland/scripts/record.sh # Record region (no sound)
bindd = Super+Ctrl+Alt, R, Record screen (no sound), exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen # [hidden] Record screen (no sound)
bindd = Super+Shift+Alt, R, Record screen (with sound), exec, ~/.config/hypr/hyprland/scripts/record.sh --fullscreen-sound # Record screen (with sound)
# AI
bindd = Super+Shift+Alt, mouse:273, Generate AI summary for selected text, exec, ~/.config/hypr/hyprland/scripts/ai/primary-buffer-query.sh # AI summary for selected text
bindd = Super+Shift, C, Color picker, exec, hyprpicker -a # Pick color (Hex) >> clipboard
bindd = Super, V, Copy clipboard history entry, exec, qs -c $qsConfig ipc call TEST_ALIVE || pkill fuzzel || cliphist list | fuzzel --match-mode fzf --dmenu | cliphist decode | wl-copy # [hidden] Clipboard history >> clipboard (fallback)

# bind = Super+Shift,       S,     exec, ~/.config/ags/scripts/grimblast.sh --freeze copy area
# bind = Super+Alt,         R,     exec, ~/.config/ags/scripts/record-script.sh
# bind = Super+Control+Alt, R,     exec, ~/.config/ags/scripts/record-script.sh --fullscreen
# bind = Super+Shift+Alt,   R,     exec, ~/.config/ags/scripts/record-script.sh --fullscreen-sound
# bind = Super+Shift,       C,     exec, hyprpicker -a
# bind = Super,             V,     exec, pkill fuzzel || cliphist list | fuzzel --no-fuzzy --dmenu | cliphist decode | wl-copy

# Text-to-image
# Normal
# bind = Control+Super+Shift,S,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract "tmp.png" - | wl-copy && rm "tmp.png"
# English
bind = Super+Shift,T,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract -l eng "tmp.png" - | wl-copy && rm "tmp.png"
# Japanese
# bind = Super+Shift,J,exec,grim -g "$(slurp $SLURP_ARGS)" "tmp.png" && tesseract -l jpn "tmp.png" - | wl-copy && rm "tmp.png"

# Media
# bindl= Super+Shift, N, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`
# bindl= ,XF86AudioNext, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`
# bind = Super+Shift+Alt, mouse:275, exec, playerctl previous
# bind = Super+Shift+Alt, mouse:276, exec, playerctl next || playerctl position `bc <<< "100 * $(playerctl metadata mpris:length) / 1000000 / 100"`
# bindl= Super+Shift, B, exec, playerctl previous
# bindl= Super+Shift, P, exec, playerctl play-pause
# bindl= ,XF86AudioPlay, exec, playerctl play-pause

# Lock screen
#bind = Super, L, exec, loginctl lock-session
# bind = Super+Shift, P, exec, loginctl lock-session
bindld = Super+Shift, Delete, Suspend system, exec, systemctl suspend || loginctl suspend # Sleep
# bindl = Super+Shift, L, exec, sleep 0.1 && systemctl suspend || loginctl suspend

# App launcher
bind = Control+Super, Slash, exec, pkill anyrun || anyrun

# ##################################### AGS keybinds #####################################
# bindr = Super, R, exec, killall ags ydotool; ags &
# bindr = Shift+Super+Alt, R, exec, hyprctl reload; killall ags ydotool; ags &
bindd = Ctrl+Super, T, Toggle wallpaper selector, global, quickshell:wallpaperSelectorToggle # Wallpaper selector
# bindd = Ctrl+Super, T, Change wallpaper, exec, qs -c $qsConfig ipc call TEST_ALIVE || ~/.config/quickshell/$qsConfig/scripts/colors/switchwall.sh # [hidden] Change wallpaper (fallback)

# bind = Control+Alt, Slash, exec, ags run-js 'cycleMode();'
# bind = Super, Slash, exec, for ((i=0; i<$(hyprctl monitors -j | jq length); i++)); do ags -t "cheatsheet""$i"; done
# bindd = Super, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Toggle cheatsheet
bindd = Super, N, Toggle right sidebar, global, quickshell:sidebarRightToggle # Toggle right sidebar
# bind = Control+Alt, Delete, exec, for ((i=0; i<$(hyprctl monitors -j | jq length); i++)); do ags -t "session""$i"; done
bindd = Ctrl+Alt, Delete, Toggle session menu, global, quickshell:sessionToggle # Toggle session menu
bind = Control+Super, G, exec, for ((i=0; i<$(hyprctl monitors -j | jq length); i++)); do ags -t "crosshair""$i"; done
bindle=, XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment || brightnessctl s 5%+ # [hidden]
bindle=, XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement || brightnessctl s 5%- # [hidden]
bindle=, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+ # [hidden]
bindle=, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%- # [hidden]

bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
# bindl  = , XF86AudioMute,         exec, ags run-js 'indicator.popup(1);'
bindld = Super+Shift,M, Toggle mute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]
# bindl  = Super+Shift,M,           exec, ags run-js 'indicator.popup(1);'

# ########################### Keybinds for Hyprland ############################

# Workspace, window, tab switch with keyboard
bind = Control+Super, BracketLeft, workspace, -1
bind = Control+Super, BracketRight, workspace, +1
bind = Control+Super, up, workspace, -5
bind = Control+Super, down, workspace, +5
bind = Super, Page_Down, workspace, +1
bind = Super, Page_Up, workspace, -1
bind = Control+Super, Page_Down, workspace, +1
bind = Control+Super, Page_Up, workspace, -1
bind = Super+Alt, Page_Down, movetoworkspace, +1
bind = Super+Alt, Page_Up, movetoworkspace, -1
bind = Super+Shift, Page_Down, movetoworkspace, +1
bind = Super+Shift, Page_Up, movetoworkspace, -1

# Fullscreen
bind = Super,     F, fullscreen,      0
bind = Super,     D, fullscreen,      1
bind = Super+Alt, F, fullscreenstate, 0, 2

# Switching
bind = Super,         1,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 1
bind = Super,         2,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 2
bind = Super,         3,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 3
bind = Super,         4,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 4
bind = Super,         5,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 5
bind = Super,         6,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 6
bind = Super,         7,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 7
bind = Super,         8,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 8
bind = Super,         9,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 9
bind = Super,         0,   exec, ~/.config/hypr/custom/scripts/relative_workspace.sh 10
bind = Super,         S,   togglespecialworkspace,
bind = Control+Super, S,   togglespecialworkspace,
bind = Super,         Tab, cyclenext
bind = Super,         Tab, bringactivetotop,   # bring it to the top

# Switching groups
bind = Super+Ctrl,    1,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 1
bind = Super+Ctrl,    2,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 2
bind = Super+Ctrl,    3,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 3
bind = Super+Ctrl,    4,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 4
bind = Super+Ctrl,    5,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 5
bind = Super+Ctrl,    6,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 6
bind = Super+Ctrl,    7,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 7
bind = Super+Ctrl,    8,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 8
bind = Super+Ctrl,    9,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 9
bind = Super+Ctrl,    0,   exec, ~/.config/hypr/custom/scripts/go_to_group.sh 10

# Move window to workspace Super + Alt + [0-9]
bind = Super+Alt, 1, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 1
bind = Super+Alt, 2, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 2
bind = Super+Alt, 3, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 3
bind = Super+Alt, 4, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 4
bind = Super+Alt, 5, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 5
bind = Super+Alt, 6, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 6
bind = Super+Alt, 7, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 7
bind = Super+Alt, 8, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 8
bind = Super+Alt, 9, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 9
bind = Super+Alt, 0, exec, ~/.config/hypr/custom/scripts/workspace_action.sh movetoworkspacesilent 10
bind = Control+Shift+Super, Up, movetoworkspacesilent, special
bind = Super+Alt, S, movetoworkspacesilent, special

# Move/resize windows with Super + LMB/RMB and dragging
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
bind = Control+Super, Backslash, resizeactive, exact 640 480
