
# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Jitsi screen share - move offscreen (note: move requires both x and y)
windowrule = match:title ^(jitsi\.mulletware\.io is sharing your screen.)$, move -100 -100

# Open floating popup windows at a default size
windowrule = match:title ^(Untitled - Google Chrome)$, float on
windowrule = match:title ^(Untitled - Google Chrome)$, size 1000 600
# DevTools
windowrule = match:title ^DevTools, tile on
# Calculator
windowrule = match:title ^(Calculator)$, move 100%-400 100%-710
windowrule = match:title ^(Calculator)$, size 400 600
# ClickUp (title match)
windowrule = match:title ^ClickUp$, float on
windowrule = match:title ^ClickUp$, size 49% 98%
windowrule = match:title ^ClickUp$, move 0.4% 1%
# Mattermost
windowrule = match:title ^Mattermost$, float on
windowrule = match:title ^Mattermost$, size 80% 80%
windowrule = match:title ^Mattermost$, center on
# Jitsi Meet
windowrule = match:title ^Jitsi Meet, float on
windowrule = match:title ^Jitsi Meet, size 100% 100%
windowrule = match:title ^Jitsi Meet, center on
# Zoho Mail
windowrule = match:title ^Zoho Mail$, float on
windowrule = match:title ^Zoho Mail$, size 60% 80%
windowrule = match:title ^Zoho Mail$, center on
# Claude
windowrule = match:title ^Claude, float on
windowrule = match:title ^Claude, size 80% 99.5%
windowrule = match:title ^Claude, move 0% -1.2%
# Google AI Studio
windowrule = match:title ^Google AI Studio, float on
windowrule = match:title ^Google AI Studio, size 80% 99.5%
windowrule = match:title ^Google AI Studio, move 0% -1.2%
# Docmost
windowrule = match:title ^Docmost, float on
windowrule = match:title ^Docmost, size 80% 99.5%
windowrule = match:title ^Docmost, move 0% -1.2%
# YouTube Music
windowrule = match:title ^YouTube Music, float on
windowrule = match:title ^YouTube Music, size 60% 80%
windowrule = match:title ^YouTube Music, center on
# ytermusic
windowrule = match:title .*ytermusic.*, float on
windowrule = match:title .*ytermusic.*, size 32% 20%
windowrule = match:title .*ytermusic.*, move 32% 74%
# ClickUp (class match)
windowrule = match:class ^ClickUp$, float on
windowrule = match:class ^ClickUp$, size 49% 98%
windowrule = match:class ^ClickUp$, move 0.4% 1%
# Figma (title match) - pinned to current size/position (4K monitor)
windowrule = match:title ^Figma$, float on
windowrule = match:title ^Figma$, size 3560 2060
windowrule = match:title ^Figma$, move 140 30
# Figma (class match)
windowrule = match:class ^figma-linux$, float on
windowrule = match:class ^figma-linux$, size 3560 2060
windowrule = match:class ^figma-linux$, move 140 30
# Steam apps - fullscreen
windowrule = match:class ^steam_app.*, fullscreen on
# exe apps - fullscreen
windowrule = match:class ^.*\.exe$, fullscreen on
# Steam apps (alternate pattern)
windowrule = match:class ^steam.*app.*, fullscreen on
# Bitwarden extension
windowrule = match:class .*nngceckbapebfimnlniiiahkandclblb.*, float on
windowrule = match:title Bitwarden, size 200 400
# pgmodeler
windowrule = match:class ^pgmodeler$, float on
windowrule = match:title ^pgModeler  - .*, tile on

# Keep focus on the floating terminal: newly-mapped WINDOWS don't grab focus (catch-all, any class).
# Covers browsers, neovide, and anything else without enumerating each app.
# IMPORTANT: this is a WINDOW rule, so it does NOT affect quickshell layer-shell overlays
#   (screenshots / region selectors) - those grab keyboard focus normally. We use this instead of
#   stay_focused (too aggressive; also blocked the screenshot layers).
# Now TOGGLED by scripts/term-focus-guard.sh based on terminal visibility (wired to Alt+Space):
#   terminal visible -> guard ON  (new windows don't steal focus)
#   terminal hidden  -> guard OFF (lone windows focus normally)
# Still a window rule, so quickshell screenshot LAYERS are unaffected either way.
source=term-focus-guard.conf
