# Scratchpad keybindings using new hyprscratch configuration file format
# All scratchpads are now defined in ~/.config/hypr/hyprscratch.conf

# Chat (commented out - not configured in new file yet)
# bind = Super, C, exec, hyprscratch toggle chat

# Terminal
bind = Alt, Space, exec, hyprscratch toggle terminal
# bind = Super, Space, exec, hyprscratch toggle terminal

# System monitor
bind = Super, b, exec, hyprscratch toggle btop

# Calculator
bind = Alt+Super, C, exec, hyprscratch toggle Calculator
bind = , XF86Calculator, exec, hyprscratch toggle Calculator

# Collaboration Tools
bind = Super, U, exec, hyprscratch toggle ClickUp
bind = Super+Alt, F, exec, hyprscratch toggle Figma
bind = Alt+Super, M, exec, hyprscratch toggle Signal
bind = Super, M, exec, hyprscratch toggle Mattermost
bind = Alt+Super, U, exec, hyprscratch toggle Docmost
bind = Super, V, exec, hyprscratch toggle Jitsi_Meet
bind = Super, Y, exec, hyprscratch toggle YouTube_Music
bind = Super, I, exec, hyprscratch toggle Zoho_Mail

# AI Studio
bind = Super, A, exec, hyprscratch toggle AI_Studio_Profile_0
bind = Alt+Super, A, exec, hyprscratch toggle AI_Studio_Profile_1

# Claude
bind = Super, C, exec, hyprscratch toggle Claude

# Obsidian
bind = Super, Semicolon, exec, hyprscratch toggle neovide-obsidian-vault
bind = Alt+Super, Semicolon, exec, hyprscratch toggle obsidian

# YouTube Music Terminal
bind = Super, Y, exec, hyprscratch toggle ytermusic

# Clipboard History
bind = Super, Return, exec, hyprscratch toggle cliphist
