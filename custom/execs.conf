# Hyprland wiki: https://wiki.hyprland.org/Configuring/Keywords/#executing

exec-once = ~/.config/hypr/scripts/autostart.sh

exec-once = ~/.config/hypr/scripts/clipboard.sh

exec-once = hyprscratch init clean spotless

exec-once = kanshi

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = hyprctl plugin load /home/dustin/src/Hyprspace/Hyprspace.so

exec-once = mkdir /run/user/1000/hyprpm

exec-once = syncthing

exec-once = udiskie

exec-once = hyprctl dispatch workspace 15

exec-once = vicinae server

# Re-resolve seat pointer focus after workspace/monitor/special changes so
# scroll events keep working without a manual mouse wiggle.
# (hyprwm/Hyprland#14767). Tunable via env: JIGGLE_PX, JIGGLE_DEBOUNCE, JIGGLE_SETTLE.
exec-once = ~/.config/hypr/custom/scripts/pointer-focus-listener.py
