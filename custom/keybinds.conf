# https://wiki.hyprland.org/Configuring/Binds/
source=unbinds.conf
# source=hyprscratch.conf  # (redundant: sourced via hyprland.conf:23)

bind = Super, L,          workspace, +1
bind = Super, H,          workspace, -1
bind = Super, K,          workspace, -5
bind = Super, J,          workspace, +5
bind = Super, mouse_up,   workspace, +1
bind = Super, mouse_down, workspace, -1

# Alacritty-specific workspace switching (mimics mouse_up/down)
$alacritty = class:^(Alacritty)$
bind = Super, down, workspace, +1, $alacritty
bind = Super, up, workspace, -1, $alacritty

# Move to workspace
bind = Super+Shift, H, exec, hyprctl dispatch movetoworkspace -1
bind = Super+Shift, L, exec, hyprctl dispatch movetoworkspace +1
bind = Super+Shift, J, exec, hyprctl dispatch movetoworkspace +5
bind = Super+Shift, K, exec, hyprctl dispatch movetoworkspace -5

bind = Super+Shift, mouse_down, movetoworkspace, -1
bind = Super+Shift, mouse_up, movetoworkspace, +1

# # Move focus
bind = Ctrl+Super, H,  movefocus, l
bind = Ctrl+Super, L,  movefocus, r
bind = Ctrl+Super, K,  movefocus, u
bind = Ctrl+Super, J,  movefocus, d

# Cycle windows (history-based like Alt+Tab)
bind = Super, Tab, cyclenext, hist
bind = Super+Shift, Tab, cyclenext, prev hist

$tiledorfloating = ~/.config/hypr/custom/scripts/tiledorfloating.sh

# Unbind conflicting keybinds from hyprland/keybinds.conf
# unbind = Ctrl+Super, Up
# unbind = Ctrl+Super, Down
unbind = Ctrl+Super+Shift, Left
unbind = Ctrl+Super+Shift, Right

# Move windows (tiled) / Focus windows (floating)
bind = Ctrl+Super, mouse_down, exec, $tiledorfloating "moveactive -40 0" "movefocus l"
bind = Ctrl+Super, mouse_up, exec, $tiledorfloating "moveactive 40 0" "movefocus r"
bind = Ctrl+Super+Shift, mouse_down, exec, $tiledorfloating "moveactive 0 -40" "movefocus u"
bind = Ctrl+Super+Shift, mouse_up, exec, $tiledorfloating "moveactive 0 40" "movefocus d"

# Move windows (tiled) / Focus windows (floating)
bind = Ctrl+Super, up, exec, $tiledorfloating "moveactive -40 0" "movefocus l"
bind = Ctrl+Super, down, exec, $tiledorfloating "moveactive 40 0" "movefocus r"
bind = Ctrl+Super+Shift, up, exec, $tiledorfloating "moveactive 0 -40" "movefocus u"
bind = Ctrl+Super+Shift, down, exec, $tiledorfloating "moveactive 0 40" "movefocus d"

# Swap windows
bind = Ctrl+Alt+Super, H,   movewindow, l
bind = Ctrl+Alt+Super, L,   movewindow, r
bind = Ctrl+Alt+Super, K,   movewindow, u
bind = Ctrl+Alt+Super, J,   movewindow, d

bind = Ctrl+Alt+Super,       mouse_down, movewindow, l
bind = Ctrl+Alt+Super,       mouse_up,   movewindow, r
bind = Ctrl+Alt+Super+Shift, mouse_down, movewindow, u
bind = Ctrl+Alt+Super+Shift, mouse_up,   movewindow, d


# Applications
# bind = Shift+Super, W, exec, firefox-developer-edition --start-debugger-server --remote-debugging-port 9223

# Overdrive volume controls
bindle=, XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/increase_volume.sh 5
bindle=, XF86AudioLowerVolume, exec, pamixer --allow-boost -d 5

# Resize windows
bindle = Super,            Minus,      resizeactive,   0 -40
bindle = Super,            Equal,      resizeactive,   0  40
bindle = Super,            Comma,      resizeactive, -40   0
bindle = Super,            Period,     resizeactive,  40   0

bindl  = Alt+Super,        mouse_down, resizeactive, -40   0
bindl  = Alt+Super,        mouse_up,   resizeactive,  40   0
bindl  = Alt+Shift+Super,  mouse_down, resizeactive,  0  -40
bindl  = Alt+Shift+Super,  mouse_up,   resizeactive,  0   40

# Move windows
bindle = Ctrl+Super,      Minus,      moveactive,    0   -8
bindle = Ctrl+Super,      Equal,      moveactive,    0    8
bindle = Ctrl+Super,      Comma,      moveactive,   -8    0
bindle = Ctrl+Super,      Period,     moveactive,    8    0

# bind = Alt+Super, Backspace, overview:toggle, toggle # can be: toggle, off/disable or on/enable
# bind = Super, Backspace, easymotion, action:hyprctl dispatch focuswindow address:{}

# Show/Hide waybar
bind = Alt+Super, Z, exec, agsv1 run-js 'toggleBarVisibility();'
bind = Super, Z, exec, agsv1 run-js 'toggleCurrentWorkspaceBarVisibility();'

# bind = Super, Space, exec, anyrun
bind = Super, Space, exec, vicinae toggle

# bind = Super, mouse_left, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 1.1}')
# bind = Super, mouse_right, exec, hyprctl -q keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | awk '/^float.*/ {print $2 * 0.9}')

bind = Super, mouse:275, exec, ~/.config/hypr/custom/scripts/inject_workspace.sh before
bind = Super, mouse:276, exec, ~/.config/hypr/custom/scripts/inject_workspace.sh after
bind = Super, delete, exec, ~/.config/hypr/custom/scripts/delete_workspace.sh

bindld = Super+Shift, Delete, Suspend system, exec, systemctl suspend || loginctl suspend # Sleep

bindd = Super, g, Toggle timewarrior, global, quickshell:timewarriorStartOrStop
bindd = Alt+Super, g, Edit timewarrior tags, global, quickshell:timewarriorEditTags

# Brave profiles
bind = Super, P, exec, brave --remote-debugging-port=9222 --profile-directory=Profile\ 0
bind = Ctrl+Super, P, exec, brave --remote-debugging-port=9222 --profile-directory=Profile\ 1
bind = Alt+Super, P, exec, brave --remote-debugging-port=9222 --profile-directory=Profile\ 2
bind = Shift+Super, P, exec, brave --remote-debugging-port=9222 --profile-directory=Profile\ 8
bind = Shift+Alt+Super, P, exec, brave --remote-debugging-port=9222 --profile-directory=Profile\ 3
bind = Shift+Ctrl+Alt+Super, P, exec, brave --remote-debugging-port=9222 --profile-directory=Profile\ 4

bind = Super+Alt, /, global, quickshell:panelFamilyCycle # Cycle panel family

